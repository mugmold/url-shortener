services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongo_local_data:/data/db

  gateway:
    build:
      context: ./nginx
    ports:
      - "80:80"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-_}
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - MONGO_URL=${MONGO_URL}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-url_shortener_db}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - CORS_ORIGINS=${CORS_ORIGINS}
    restart: unless-stopped
    depends_on:
      - mongodb

volumes:
  mongo_local_data: